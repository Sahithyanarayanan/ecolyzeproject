<div class="modal fade" id="logoutModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content text-center p-4">
      <i class="fa fa-sign-out-alt fa-2x text-primary mb-3"></i>
      <h5 class="fw-bold">Confirm Logout</h5>
      <p class="text-muted mb-4">Are you sure you want to logout?</p>
      <div class="d-flex justify-content-center gap-3">
        <a href="/logout" class="btn-logout btn">Logout</a>
        <button class="btn btn-secondary" data-bs-dismiss="modal" style="border-radius:8px;">Cancel</button>
      </div>
    </div>
  </div>
</div>


<!-- ==================== EDIT PREDICTION MODAL ==================== -->
<div class="modal fade" id="editPredModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header border-0">
        <h5 class="modal-title fw-bold"><i class="fa fa-edit me-2 text-primary"></i>Edit Prediction</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <form id="editPredForm" method="post" action="">
        <div class="modal-body">
          <label class="form-label fw-semibold">Gene Name</label>
          <input type="text" name="gene" id="editGeneName" class="form-control"
            placeholder="Enter gene name" required style="border-radius:10px; padding:12px;">
        </div>
        <div class="modal-footer border-0">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
          <button type="submit" class="btn btn-primary" style="border-radius:8px;">
            <i class="fa fa-save me-1"></i> Save Changes
          </button>
        </div>
      </form>
    </div>
  </div>
</div>


<!-- ==================== EDIT USER MODAL ==================== -->
<div class="modal fade" id="editUserModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header border-0">
        <h5 class="modal-title fw-bold"><i class="fa fa-user-edit me-2 text-primary"></i>Edit Profile</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <form id="editUserForm" method="post">
        <div class="modal-body">
          <div class="mb-3">
            <label class="form-label fw-semibold">Full Name</label>
            <input type="text" name="name" id="editUserName" class="form-control"
              placeholder="Enter name" required style="border-radius:10px; padding:12px;">
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">Email Address</label>
            <input type="email" name="email" id="editUserEmail" class="form-control"
              placeholder="Enter email" required style="border-radius:10px; padding:12px;">
          </div>
        </div>
        <div class="modal-footer border-0">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
          <button type="submit" class="btn btn-primary" style="border-radius:8px;">
            <i class="fa fa-save me-1"></i> Save Changes
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
<!-- DELETE CONFIRM MODAL -->
<div class="modal fade" id="deleteModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content text-center p-4">
      <i class="fa fa-trash fa-2x text-danger mb-3"></i>
      <h5 class="fw-bold">Delete Prediction</h5>
      <p class="text-muted mb-4">Are you sure you want to delete this prediction?</p>

      <form id="deleteForm" method="post">
        <div class="d-flex justify-content-center gap-3">
          <button type="submit" class="btn btn-danger">Yes, Delete</button>
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">
            Cancel
          </button>
        </div>
      </form>

    </div>
  </div>
</div>
<!-- ANALYSIS MODAL -->
<!-- ANALYSIS MODAL -->
<div class="modal fade" id="analysisModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered modal-lg">
    <div class="modal-content p-4 text-center">

      <!-- LOADER -->
      <div id="modalLoader">

        <h4 class="mb-4 fw-bold text-primary">
          <i class="fa fa-dna me-2"></i>Analyzing DNA Sequence
        </h4>

        <div class="progress mb-4" style="height: 8px;">
          <div id="progressBar" class="progress-bar progress-bar-striped progress-bar-animated"
               style="width: 0%"></div>
        </div>

        <div class="text-start" style="max-width:350px; margin:auto;">
          <div id="step1" class="loader-step active">
            <i class="fa fa-spinner fa-spin me-2"></i>Reading DNA sequence
          </div>

          <div id="step2" class="loader-step text-muted">
            <i class="fa fa-circle me-2"></i>Extracting trimer frequency
          </div>

          <div id="step3" class="loader-step text-muted">
            <i class="fa fa-circle me-2"></i>Running prediction model
          </div>
        </div>

      </div>

      <!-- RESULT -->
      <div id="modalResult" style="display:none;">

        <h4 class="mb-3">
          <i class="fa fa-flask text-primary me-2"></i>Prediction Result
        </h4>

        <div id="resultText" class="fw-bold mb-3"></div>

        <div style="width:300px; height:300px; margin:auto;">
          <canvas id="modalResultChart"></canvas>
        </div>

        <div class="mt-4">
          <button class="btn btn-primary me-2" onclick="location.reload()">
            Analyze Another
          </button>
          <button class="btn btn-secondary" data-bs-dismiss="modal">
            Close
          </button>
          
  <button class="btn btn-success me-2" onclick="downloadReport()">
    <i class="fa fa-download me-1"></i> Download Report
  </button>

        </div>

      </div>

    </div>
  </div>
</div>
